# yaml-language-server: $schema=https://raw.githubusercontent.com/DavidAnson/markdownlint-cli2/refs/heads/main/schema/markdownlint-cli2-config-schema.json
config:
  default: true
  # Keep prose readable in terminals and diffs; tables are exempt.
  line-length:
    line_length: 120
    tables: false
  no-duplicate-heading:
    siblings_only: true
  # gofmt mandates hard tabs, so Go examples in code fences keep them; prose stays tab-free.
  no-hard-tabs:
    code_blocks: false
  # required for admonitions
  code-block-style: false

globs:
  - "**/*.md"

ignores:
  - "node_modules/**"
  - ".claude/**"
  - "e2e/**"
  - "dist/**"
  - ".venv/**"
  - "site/**"
  # generated command reference — cobra's output, not house prose.
  - "docs/cli/**"
  # generated configuration reference — evolve docs --format config.
  - "docs/config/**"
  # machine-written by release-please, not house prose.
  - "CHANGELOG.md"
  - "CLAUDE.md"
