# Continuous integration — thin caller for the org's reusable ci workflow. It runs
# the canonical Makefile gates (lint, build, test) as one parallel job each, then a
# Codecov upload from coverage/cobertura-coverage.xml (emitted by `make test`).
# `make lint` carries all check-mode static analysis — go vet, govulncheck,
# golangci-lint, prettier --check, markdownlint, addlicense. The Go version comes
# from go.mod and the Node version from .node-version.
#
# The reusable workflow is pinned to a full commit SHA (tag in the comment) so a
# moved tag can never change what runs; Dependabot keeps the pin fresh.
name: Continuous Integration

on:
  push:
    branches: [main]
  pull_request:

# the reusable workflow's jobs only need contents:read; grant just that ceiling
permissions:
  contents: read

jobs:
  ci:
    uses: bitwise-media-group/github-workflows/.github/workflows/ci.yaml@e37b7f61bbd233ae77aad81c967d08ad49220b8f # v2.0.0
    with:
      # Default is go.sum; list every lockfile that affects the build. `make lint`
      # vets the e2e module and runs the tools/ CLIs (golangci-lint, govulncheck,
      # addlicense); `make test` uses gocover-cobertura, also from tools/.
      # e2e/ has no external deps yet (no go.sum), but is listed so the cache key
      # tracks it once it does.
      cache-dependency-path: |
        go.sum
        tools/go.sum
        e2e/go.sum
