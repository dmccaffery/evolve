# CodeQL security analysis — scans the Go module and the repository's own
# GitHub Actions workflows on every push and pull request, plus a weekly
# scheduled run so newly published queries reach already-merged code. The Go
# version comes from go.mod, never the workflow.
#
# Every action is pinned to a full commit SHA (tag in the comment) so a moved
# tag can never change what runs; Dependabot keeps the pins fresh.
name: codeql

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "28 20 * * 4"

# granted per job
permissions: {}

jobs:
  analyze:
    name: analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      # upload analysis results to code scanning
      security-events: write
      # fetch internal or private CodeQL packs
      packages: read
      # only required for workflows in private repositories
      actions: read
      # check out the repository
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          # Interpreted target: workflow YAML needs no build.
          - language: actions
            build-mode: none
          # Compiled target: autobuild observes a real `go build` so every
          # source file the module compiles is extracted.
          - language: go
            build-mode: autobuild
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # Match the module's Go toolchain so autobuild compiles the code the way
      # the project does.
      - if: matrix.language == 'go'
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: "/language:${{ matrix.language }}"
