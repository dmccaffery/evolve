# Tag-driven release — pushing a vX.Y.Z tag runs GoReleaser: binary archives
# + checksums + SBOMs on the GitHub release.
name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the GitHub release

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0 # GoReleaser needs full history + tags for the changelog

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      # SBOMs use the syft pinned in tools/go.mod (invoked via `go tool`
      # by the sboms config) — no separate syft install step.
      - uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
